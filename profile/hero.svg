<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" fill="none" role="img" aria-label="ChurchApps — free, open-source software for the Church">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0A1836"/>
      <stop offset="0.55" stop-color="#122B6B"/>
      <stop offset="1" stop-color="#1E4FC8"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0.85" cy="0.15" r="0.7">
      <stop offset="0" stop-color="#38BDF8" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0.1" cy="1" r="0.8">
      <stop offset="0" stop-color="#6D28D9" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#6D28D9" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sweep" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FBBF24"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.5" fill="#ffffff" fill-opacity="0.06"/>
    </pattern>
    <clipPath id="round"><rect width="1200" height="300" rx="20"/></clipPath>
  </defs>

  <g clip-path="url(#round)">
    <rect width="1200" height="300" fill="url(#bg)"/>
    <rect width="1200" height="300" fill="url(#dots)"/>
    <rect width="1200" height="300" fill="url(#glowA)"/>
    <rect width="1200" height="300" fill="url(#glowB)"/>

    <!-- subtle cross watermark, right side -->
    <g fill="#ffffff" fill-opacity="0.05">
      <rect x="1010" y="40" width="34" height="220" rx="6"/>
      <rect x="960" y="96" width="134" height="34" rx="6"/>
    </g>

    <!-- moving light sweep -->
    <rect x="-500" y="0" width="360" height="300" fill="url(#sweep)" transform="skewX(-18)">
      <animate attributeName="x" from="-500" to="1500" dur="7s" begin="0.6s" repeatCount="indefinite"/>
    </rect>

    <!-- twinkling accents -->
    <g fill="url(#gold)">
      <circle cx="150" cy="60" r="3"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.2s" repeatCount="indefinite"/></circle>
      <circle cx="920" cy="70" r="2.5"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.6s" begin="0.7s" repeatCount="indefinite"/></circle>
      <circle cx="1080" cy="230" r="2.5"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="3.6s" begin="1.1s" repeatCount="indefinite"/></circle>
      <circle cx="70" cy="235" r="2"><animate attributeName="opacity" values="0.25;1;0.25" dur="2.9s" begin="0.3s" repeatCount="indefinite"/></circle>
    </g>

    <!-- wordmark -->
    <g font-family="Segoe UI, Helvetica, Arial, sans-serif">
      <text x="80" y="132" fill="#ffffff" font-size="68" font-weight="800" letter-spacing="-1.5">ChurchApps</text>
      <rect x="83" y="150" width="300" height="4" rx="2" fill="url(#gold)"/>
      <text x="84" y="192" fill="#C7D6F5" font-size="24" font-weight="400">Free, open-source software for the Church</text>

      <!-- product chips -->
      <g>
        <g transform="translate(84,224)">
          <rect width="128" height="40" rx="20" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.22"/>
          <text x="64" y="26" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="600">FreeShow</text>
        </g>
        <g transform="translate(224,224)">
          <rect width="140" height="40" rx="20" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.22"/>
          <text x="70" y="26" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="600">B1 Church</text>
        </g>
        <g transform="translate(376,224)">
          <rect width="176" height="40" rx="20" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.22"/>
          <text x="88" y="26" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="600">Lessons.church</text>
        </g>
      </g>
    </g>

    <rect width="1200" height="300" rx="20" fill="none" stroke="#ffffff" stroke-opacity="0.10" stroke-width="2"/>
  </g>
</svg>
